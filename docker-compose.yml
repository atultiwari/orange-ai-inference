version: '3.8'

services:
  backend:
    build:
      context: ./backend
    expose:
      - "8080"
    volumes:
      - backend_uploads:/app/uploaded_models
    restart: unless-stopped
    environment:
      - TZ=UTC

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
